<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jira Stories &amp; Bugs Dashboard</title>
<link rel="stylesheet" href="styles.css">
<script src="app.js"></script>
</head>
<body>

<!-- LOADING STATE -->
<div class="loading" id="loadingState">
  <div class="spinner"></div>
  <span>Loading dashboard...</span>
</div>

<!-- ERROR BANNER -->
<div class="error-banner" id="errorBanner"></div>

<!-- MAIN CONTENT (hidden until data loads) -->
<div id="mainContent" style="display:none">

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <h1 id="headerTitle">Jira Stories &amp; Bugs Dashboard</h1>
    <div class="sub" id="headerSub">Loading...</div>
    <div class="header-pills" id="headerPills"></div>
  </div>
  <div class="header-right">
    <div class="project-selector">
      <label>Project:</label>
      <select id="projectSelect"></select>
      <button class="refresh-btn" id="refreshBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        Refresh
      </button>
    </div>
    <div class="auto-refresh">Auto-refreshes every 5 minutes</div>
  </div>
</div>

<!-- STATS -->
<div class="stats-container" id="statsContainer"></div>

<!-- DUE DATES -->
<div class="due-section" id="dueSection"></div>

<!-- FILTERS -->
<div class="filters" id="filtersBar">
  <span class="filter-label">Filter:</span>
  <button class="reset-btn" id="resetBtn">Reset</button>
  <button class="export-btn" id="exportBtn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Export Excel
  </button>
  <span class="result-count" id="resultCount"></span>
</div>

<!-- TABLE -->
<div class="table-wrap">
<table id="mainTable">
<thead>
  <tr>
    <th data-col="0">Key <span class="sort-arrow" id="sa0"></span></th>
    <th data-col="1">Type <span class="sort-arrow" id="sa1"></span></th>
    <th data-col="2">Summary <span class="sort-arrow" id="sa2"></span></th>
    <th data-col="3">Status <span class="sort-arrow" id="sa3"></span></th>
    <th data-col="4">Priority <span class="sort-arrow" id="sa4"></span></th>
    <th data-col="5">Assignee <span class="sort-arrow" id="sa5"></span></th>
    <th data-col="6">Age <span class="sort-arrow" id="sa6"></span></th>
    <th data-col="7">Due Date <span class="sort-arrow" id="sa7"></span></th>
    <th>Labels</th>
    <th>Latest Comment</th>
  </tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
<div class="no-data" id="noData">No issues match the current filters.</div>
</div>

</div><!-- /mainContent -->

<script>
// ── Hardcoded hex colors (Forge CSP may block var() in inline styles) ──
var C = {
  red:'#dc2626', orange:'#ea580c', yellow:'#a16207', green:'#15803d',
  blue:'#2563eb', indigo:'#6366f1', cyan:'#0891b2', muted:'#5c636a',
  text:'#1a1a2e', muted2:'#6e7781',
  redBg:'#fecaca', orangeBg:'#fed7aa', yellowBg:'#fde68a', greenBg:'#bbf7d0',
  blueBg:'#bfdbfe', indigoBg:'#c7d2fe', cyanBg:'#a5f3fc', mutedBg:'#e9ecef',
  surface2:'#f1f3f5'
};

// ── State ──
var currentData = null;
var filterDefs = {};
var sortCol = -1;
var sortDir = 1;
var priorityOrder = {critical:0,highest:0,high:1,medium:2,low:3,lowest:4};

var priorityColor = {Critical:C.red,Highest:C.red,High:C.orange,Medium:C.yellow,Low:C.green,Lowest:C.muted};
var priorityBg = {Critical:C.redBg,Highest:C.redBg,High:C.orangeBg,Medium:C.yellowBg,Low:C.greenBg,Lowest:C.mutedBg};
var statusColor = {'To Do':C.muted,Blocked:C.red,'In Progress':C.blue,'Code Review':C.indigo,'Deploy to QA':C.cyan,'QA Ready to Test':C.cyan,'QA in Test':C.cyan,'UAT Test Ready':C.cyan,'UAT in TEST':C.cyan,'Ready To Demo':C.green};
var statusBg = {'To Do':C.mutedBg,Blocked:C.redBg,'In Progress':C.blueBg,'Code Review':C.indigoBg,'Deploy to QA':C.cyanBg,'QA Ready to Test':C.cyanBg,'QA in Test':C.cyanBg,'UAT Test Ready':C.cyanBg,'UAT in TEST':C.cyanBg,'Ready To Demo':C.greenBg};
var ageColor = {fresh:C.green,ageing:C.yellow,stale:C.orange,critical:C.red};
var ageBg = {fresh:C.greenBg,ageing:C.yellowBg,stale:C.orangeBg,critical:C.redBg};

// ── Event Listeners ──
document.getElementById('refreshBtn').addEventListener('click', function() { loadData(); });
document.getElementById('resetBtn').addEventListener('click', function() { resetFilters(); });
document.getElementById('exportBtn').addEventListener('click', function() { exportToExcel(); });
document.querySelectorAll('#mainTable thead th[data-col]').forEach(function(th) {
  th.addEventListener('click', function() { sortTable(parseInt(th.getAttribute('data-col'))); });
});
document.addEventListener('click', function(e) {
  if (!e.target.closest('.ms-wrap')) {
    document.querySelectorAll('.ms-dropdown').forEach(function(d) { d.classList.remove('open'); });
  }
});

// ── Init ──
async function init() {
  var projects = await invoke('getProjects');
  var select = document.getElementById('projectSelect');
  projects.forEach(function(p) {
    var opt = document.createElement('option');
    opt.value = p.key;
    opt.textContent = p.key + ' \u2014 ' + p.name;
    select.appendChild(opt);
  });
  select.addEventListener('change', loadData);
  await loadData();
}

async function loadData() {
  var project = document.getElementById('projectSelect').value;
  var btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  try {
    currentData = await invoke('getIssues', { projectKey: project });
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('mainContent').style.display = '';
    document.getElementById('errorBanner').style.display = 'none';
    render();
  } catch (err) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorBanner').textContent = 'Error: ' + (err.message || err);
    document.getElementById('errorBanner').style.display = 'block';
  } finally {
    btn.classList.remove('spinning');
  }
}

// ── Render ──
function render() {
  var data = currentData;
  var stats = data.stats;
  var date = new Date(data.refreshedAt).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });

  document.getElementById('headerTitle').textContent = data.project + ' \u2014 Stories & Bugs';
  document.getElementById('headerSub').textContent = 'Excludes: Accepted / Done / Abandoned  |  Refreshed: ' + date;

  var pills = document.getElementById('headerPills');
  pills.innerHTML = '<span class="hpill">' + stats.total + ' Total Open</span>' +
    '<span class="hpill story">' + (stats.byType['Story'] || 0) + ' Stories</span>' +
    '<span class="hpill bug">' + (stats.byType['Bug'] || 0) + ' Bugs</span>';

  renderStats(stats);
  renderDueDates(stats);
  buildFilters(stats, data.issues);
  renderTable(data.issues);
}

function cardHtml(num, label, color, bg) {
  return '<div class="stat-card" style="background:' + bg + ';border-left:4px solid ' + color + '">' +
    '<div class="stat-num" style="color:' + color + '">' + num + '</div>' +
    '<div class="stat-label" style="color:' + C.muted + '">' + label + '</div></div>';
}

function renderStats(stats) {
  var container = document.getElementById('statsContainer');
  var html = '';

  // By Status
  html += '<div class="stat-section"><h3>By Status</h3><div class="stat-row">';
  Object.entries(stats.byStatus).forEach(function(e) {
    var color = statusColor[e[0]] || C.blue;
    var bg = statusBg[e[0]] || C.blueBg;
    html += cardHtml(e[1], e[0], color, bg);
  });
  html += '</div></div>';

  // By Priority
  html += '<div class="stat-section"><h3>By Priority</h3><div class="stat-row">';
  ['Critical','Highest','High','Medium','Low','Lowest'].forEach(function(p) {
    if (!stats.byPriority[p]) return;
    html += cardHtml(stats.byPriority[p], p, priorityColor[p] || C.muted, priorityBg[p] || C.mutedBg);
  });
  Object.keys(stats.byPriority).forEach(function(p) {
    if (['Critical','Highest','High','Medium','Low','Lowest'].includes(p)) return;
    html += cardHtml(stats.byPriority[p], p, C.muted, C.mutedBg);
  });
  html += '</div></div>';

  // By Age
  html += '<div class="stat-section"><h3>By Age</h3><div class="stat-row">';
  html += cardHtml(stats.byAge.fresh, '\u22647 days<br><span style="font-size:10px">fresh</span>', C.green, C.greenBg);
  html += cardHtml(stats.byAge.ageing, '8\u201330 days<br><span style="font-size:10px">ageing</span>', C.yellow, C.yellowBg);
  html += cardHtml(stats.byAge.stale, '31\u201390 days<br><span style="font-size:10px">stale</span>', C.orange, C.orangeBg);
  html += cardHtml(stats.byAge.critical, '>90 days<br><span style="font-size:10px">critical</span>', C.red, C.redBg);
  html += '</div></div>';

  container.innerHTML = html;
}

function renderDueDates(stats) {
  var sec = document.getElementById('dueSection');
  sec.innerHTML = '<h3>Due Dates</h3><div class="due-cards">' +
    cardHtml(stats.dueDates.overdue, 'Overdue', C.red, C.redBg) +
    cardHtml(stats.dueDates.dueSoon, 'Due \u22647 Days', C.yellow, C.yellowBg) +
    cardHtml(stats.dueDates.hasDueDate, 'Has Due Date', C.blue, C.blueBg) +
    cardHtml(stats.dueDates.noDueDate, 'No Due Date', C.muted, C.mutedBg) +
  '</div>';
}

// ── Filters ──
function buildFilters(stats, issues) {
  var bar = document.getElementById('filtersBar');
  bar.querySelectorAll('.ms-wrap').forEach(function(el) { el.remove(); });
  var resetBtn = document.getElementById('resetBtn');

  filterDefs = {
    type: Object.keys(stats.byType).sort(),
    status: Object.keys(stats.byStatus).sort(),
    priority: ['Critical','Highest','High','Medium','Low','Lowest'].filter(function(p) { return stats.byPriority[p]; }),
    assignee: stats.assignees,
    age: ['fresh','ageing','stale','critical'],
    label: stats.labels,
  };

  Object.entries(filterDefs).forEach(function(entry) {
    var key = entry[0]; var values = entry[1];
    if (values.length === 0) return;
    var wrap = document.createElement('div');
    wrap.className = 'ms-wrap';
    wrap.id = 'wrap_' + key;

    var btn = document.createElement('button');
    btn.className = 'ms-btn';
    btn.innerHTML = key.charAt(0).toUpperCase() + key.slice(1) + ' <span class="ms-arrow">&#x25BE;</span>';
    btn.addEventListener('click', function(e) { e.stopPropagation(); toggleDropdown(key); });

    var dd = document.createElement('div');
    dd.className = 'ms-dropdown';
    dd.id = 'dd_' + key;

    values.forEach(function(v, i) {
      var label = document.createElement('label');
      label.className = 'ms-item';
      var cb = document.createElement('input');
      cb.type = 'checkbox'; cb.className = 'ms-check'; cb.value = v; cb.id = 'cb_' + key + '_' + i;
      cb.addEventListener('change', function() { applyFilters(); });
      var span = document.createElement('span');
      span.textContent = v;
      label.appendChild(cb); label.appendChild(span); dd.appendChild(label);
    });

    wrap.appendChild(btn); wrap.appendChild(dd);
    bar.insertBefore(wrap, resetBtn);
  });
}

function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function toggleDropdown(id) {
  var dd = document.getElementById('dd_' + id);
  document.querySelectorAll('.ms-dropdown').forEach(function(d) { if (d !== dd) d.classList.remove('open'); });
  dd.classList.toggle('open');
}

function getSelected(filterId) {
  var vals = [];
  document.querySelectorAll('#dd_' + filterId + ' .ms-check').forEach(function(c) { if (c.checked) vals.push(c.value.toLowerCase()); });
  return vals;
}

function applyFilters() {
  var filters = {};
  Object.keys(filterDefs).forEach(function(key) { filters[key] = getSelected(key); });
  var rows = document.querySelectorAll('#tableBody tr');
  var visible = 0;
  rows.forEach(function(row) {
    var d = row.dataset;
    var labels = (d.labels || '').toLowerCase().split(',').filter(Boolean);
    var match =
      (filters.type.length === 0 || filters.type.includes((d.type||'').toLowerCase())) &&
      (filters.status.length === 0 || filters.status.includes((d.status||'').toLowerCase())) &&
      (filters.priority.length === 0 || filters.priority.includes((d.priority||'').toLowerCase())) &&
      (filters.assignee.length === 0 || filters.assignee.includes((d.assignee||'').toLowerCase())) &&
      (filters.age.length === 0 || filters.age.includes((d.age||'').toLowerCase())) &&
      (filters.label.length === 0 || filters.label.some(function(l) { return labels.includes(l); }));
    row.style.display = match ? '' : 'none';
    if (match) visible++;
  });
  document.getElementById('resultCount').textContent = 'Showing ' + visible + ' issues';
  document.getElementById('noData').style.display = visible === 0 ? 'block' : 'none';
  document.getElementById('mainTable').style.display = visible === 0 ? 'none' : '';
}

function resetFilters() {
  document.querySelectorAll('.ms-check').forEach(function(c) { c.checked = false; });
  applyFilters();
}

// ── Export to Excel (CSV with .xls extension for Excel compatibility) ──
function exportToExcel() {
  if (!currentData) return;
  var rows = document.querySelectorAll('#tableBody tr');
  var csvRows = [];
  csvRows.push(['Key','Type','Summary','Status','Priority','Assignee','Age (days)','Due Date','Labels','Latest Comment'].join('\t'));

  rows.forEach(function(row) {
    if (row.style.display === 'none') return;
    var cells = row.querySelectorAll('td');
    var key = cells[0] ? cells[0].textContent.trim() : '';
    var type = cells[1] ? cells[1].textContent.trim() : '';
    var summary = cells[2] ? cells[2].textContent.trim() : '';
    var status = cells[3] ? cells[3].textContent.trim() : '';
    var priority = cells[4] ? cells[4].textContent.trim() : '';
    var assignee = cells[5] ? cells[5].textContent.trim() : '';
    var age = cells[6] ? cells[6].textContent.trim() : '';
    var dueDate = cells[7] ? cells[7].textContent.trim() : '';
    var labels = cells[8] ? cells[8].textContent.trim() : '';
    var comment = cells[9] ? cells[9].textContent.trim().replace(/[\t\n\r]+/g, ' ') : '';
    csvRows.push([key, type, summary, status, priority, assignee, age, dueDate, labels, comment].join('\t'));
  });

  var tsv = csvRows.join('\n');
  var blob = new Blob(['\uFEFF' + tsv], { type: 'application/vnd.ms-excel;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = currentData.project + '_issues_' + new Date().toISOString().slice(0, 10) + '.xls';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Table ──
function renderTable(issues) {
  var tbody = document.getElementById('tableBody');
  tbody.innerHTML = issues.map(function(issue) {
    var typeColor = issue.type === 'Bug' ? C.red : C.blue;
    var typeBg = issue.type === 'Bug' ? C.redBg : C.blueBg;
    var sColor = statusColor[issue.status] || C.blue;
    var pColor = priorityColor[issue.priority] || C.muted;
    var aColor = ageColor[issue.ageBucket];
    var aBg = ageBg[issue.ageBucket];
    var summary = issue.summary.length > 80 ? issue.summary.slice(0, 77) + '...' : issue.summary;
    var dueCell = issue.dueDate
      ? '<span style="color:' + (issue.dueStatus==='overdue'? C.red : issue.dueStatus==='due-soon'? C.yellow : C.text) + ';font-size:12px">' + issue.dueDate + '</span>'
      : '<span style="color:' + C.muted2 + '">\u2014</span>';
    var labelsHtml = issue.labels.length > 0
      ? issue.labels.map(function(l) { return '<span class="label-badge">' + escHtml(l) + '</span>'; }).join('')
      : '<span style="color:' + C.muted2 + '">\u2014</span>';
    var commentHtml = issue.latestComment
      ? '<div class="comment-block"><div class="comment-author">' + escHtml(issue.latestComment.author) + '</div><div class="comment-date">' + issue.latestComment.date + '</div><div class="comment-text">' + escHtml(issue.latestComment.body.slice(0, 120)) + '</div></div>'
      : '<span style="color:' + C.muted2 + '">\u2014</span>';

    return '<tr data-type="' + escHtml(issue.type) + '" data-status="' + escHtml(issue.status) + '" data-priority="' + escHtml(issue.priority) + '" data-assignee="' + escHtml(issue.assignee) + '" data-age="' + issue.ageBucket + '" data-labels="' + escHtml(issue.labels.join(',')) + '">' +
      '<td><a href="' + issue.url + '" target="_blank" class="issue-link">' + issue.key + '</a></td>' +
      '<td><span class="type-badge" style="color:' + typeColor + ';background:' + typeBg + ';border-color:' + typeColor + '">' + (issue.type === 'Bug' ? 'Bug' : 'Story') + '</span></td>' +
      '<td class="summary-cell" title="' + escHtml(issue.summary) + '">' + escHtml(summary) + '</td>' +
      '<td><span style="color:' + sColor + ';font-size:12px;font-weight:600">' + escHtml(issue.status) + '</span></td>' +
      '<td><span style="color:' + pColor + ';font-weight:700;font-size:12px">' + escHtml(issue.priority) + '</span></td>' +
      '<td style="font-size:12px;color:' + C.text + '">' + escHtml(issue.assignee) + '</td>' +
      '<td data-days="' + issue.daysOpen + '"><span class="age-badge" style="color:' + aColor + ';background:' + aBg + ';border-color:' + aColor + '">' + issue.daysOpen + 'd</span></td>' +
      '<td data-due="' + (issue.dueDate || 'None') + '">' + dueCell + '</td>' +
      '<td style="font-size:11px">' + labelsHtml + '</td>' +
      '<td style="font-size:11px">' + commentHtml + '</td>' +
    '</tr>';
  }).join('');

  document.getElementById('resultCount').textContent = 'Showing ' + issues.length + ' issues';
  document.getElementById('noData').style.display = issues.length === 0 ? 'block' : 'none';
}

// ── Sort ──
function sortTable(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('.sort-arrow').forEach(function(a, i) {
    a.textContent = i === col ? (sortDir === 1 ? '\u25B2' : '\u25BC') : '';
  });
  var tbody = document.getElementById('tableBody');
  var rows = Array.from(tbody.querySelectorAll('tr'));
  rows.sort(function(a, b) {
    var av, bv;
    if (col === 6) {
      av = parseInt(a.querySelector('td:nth-child(7)').getAttribute('data-days') || '0');
      bv = parseInt(b.querySelector('td:nth-child(7)').getAttribute('data-days') || '0');
      return sortDir * (av - bv);
    } else if (col === 7) {
      av = a.querySelector('td:nth-child(8)').getAttribute('data-due') || '';
      bv = b.querySelector('td:nth-child(8)').getAttribute('data-due') || '';
      if (av === 'None' && bv === 'None') return 0;
      if (av === 'None') return 1;
      if (bv === 'None') return -1;
      return sortDir * av.localeCompare(bv);
    } else if (col === 4) {
      av = (a.querySelector('td:nth-child(5)').textContent || '').trim().toLowerCase();
      bv = (b.querySelector('td:nth-child(5)').textContent || '').trim().toLowerCase();
      return sortDir * ((priorityOrder[av] !== undefined ? priorityOrder[av] : 99) - (priorityOrder[bv] !== undefined ? priorityOrder[bv] : 99));
    } else {
      av = (a.querySelector('td:nth-child(' + (col+1) + ')').textContent || '').trim().toLowerCase();
      bv = (b.querySelector('td:nth-child(' + (col+1) + ')').textContent || '').trim().toLowerCase();
      return sortDir * av.localeCompare(bv);
    }
  });
  rows.forEach(function(r) { tbody.appendChild(r); });
}

// ── Auto-refresh every 5 min ──
setInterval(loadData, 5 * 60 * 1000);

// ── Boot ──
init().catch(function(err) {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('errorBanner').textContent = 'Failed to initialize: ' + (err.message || err);
  document.getElementById('errorBanner').style.display = 'block';
});
</script>
</body>
</html>
