<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jira Stories &amp; Bugs Dashboard</title>
<link rel="stylesheet" href="styles.css">
<script src="app.js"></script>
</head>
<body>

<div class="loading" id="loadingState">
  <div class="spinner"></div>
  <span>Loading dashboard...</span>
</div>

<div class="error-banner" id="errorBanner"></div>

<div id="mainContent" class="hidden">

<div class="header">
  <div class="header-left">
    <h1 id="headerTitle">Jira Stories &amp; Bugs Dashboard</h1>
    <div class="sub" id="headerSub">Loading...</div>
    <div class="header-pills" id="headerPills"></div>
  </div>
  <div class="header-right">
    <div class="project-selector">
      <label>Project:</label>
      <select id="projectSelect"></select>
      <button class="refresh-btn" id="refreshBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        Refresh
      </button>
    </div>
    <div class="auto-refresh">Auto-refreshes every 5 minutes</div>
  </div>
</div>

<div class="stats-container" id="statsContainer"></div>
<div class="due-section" id="dueSection"></div>

<div class="filters" id="filtersBar">
  <span class="filter-label">Filter:</span>
  <button class="reset-btn" id="resetBtn">Reset</button>
  <button class="export-btn" id="exportBtn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Export Excel
  </button>
  <span class="result-count" id="resultCount"></span>
</div>

<div class="table-wrap">
<table id="mainTable">
<thead>
  <tr>
    <th data-col="0">Key <span class="sort-arrow" id="sa0"></span></th>
    <th data-col="1">Type <span class="sort-arrow" id="sa1"></span></th>
    <th data-col="2">Summary <span class="sort-arrow" id="sa2"></span></th>
    <th data-col="3">Status <span class="sort-arrow" id="sa3"></span></th>
    <th data-col="4">Priority <span class="sort-arrow" id="sa4"></span></th>
    <th data-col="5">Assignee <span class="sort-arrow" id="sa5"></span></th>
    <th data-col="6">Age <span class="sort-arrow" id="sa6"></span></th>
    <th data-col="7">Due Date <span class="sort-arrow" id="sa7"></span></th>
    <th>Labels</th>
    <th>Latest Comment</th>
  </tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
<div class="no-data" id="noData">No issues match the current filters.</div>
<div class="pagination" id="pagination">
  <button class="page-btn" id="prevPage">Previous</button>
  <span class="page-info" id="pageInfo"></span>
  <button class="page-btn" id="nextPage">Next</button>
</div>
</div>

</div>

<script>
// ── Color class mappings (all colors via CSS classes, zero inline styles) ──
var priorityClass = {Critical:'red',Highest:'red',High:'orange',Medium:'yellow',Low:'green',Lowest:'muted'};
var statusClass = {'To Do':'muted',Blocked:'red','In Progress':'blue','Code Review':'indigo','Deploy to QA':'cyan','QA Ready to Test':'cyan','QA in Test':'cyan','UAT Test Ready':'cyan','UAT in TEST':'cyan','Ready To Demo':'green'};
var ageClass = {fresh:'green',ageing:'yellow',stale:'orange',critical:'red'};

var priorityOrder = {critical:0,highest:0,high:1,medium:2,low:3,lowest:4};
var currentData = null;
var filterDefs = {};
var sortCol = -1;
var sortDir = 1;
var currentPage = 0;
var pageSize = 100;
var filteredIssues = [];

// ── Event Listeners ──
document.getElementById('refreshBtn').addEventListener('click', function() { loadData(); });
document.getElementById('resetBtn').addEventListener('click', function() { resetFilters(); });
document.getElementById('exportBtn').addEventListener('click', function() { exportToExcel(); });
document.getElementById('prevPage').addEventListener('click', function() { if (currentPage > 0) { currentPage--; renderCurrentPage(); } });
document.getElementById('nextPage').addEventListener('click', function() { if ((currentPage + 1) * pageSize < filteredIssues.length) { currentPage++; renderCurrentPage(); } });
document.querySelectorAll('#mainTable thead th[data-col]').forEach(function(th) {
  th.addEventListener('click', function() { sortTable(parseInt(th.getAttribute('data-col'))); });
});
document.addEventListener('click', function(e) {
  if (!e.target.closest('.ms-wrap')) {
    document.querySelectorAll('.ms-dropdown').forEach(function(d) { d.classList.remove('open'); });
  }
});

// ── Init ──
async function init() {
  var projects = await invoke('getProjects');
  var select = document.getElementById('projectSelect');
  projects.forEach(function(p) {
    var opt = document.createElement('option');
    opt.value = p.key;
    opt.textContent = p.key + ' \u2014 ' + p.name;
    select.appendChild(opt);
  });
  select.addEventListener('change', loadData);
  await loadData();
}

async function loadData() {
  var project = document.getElementById('projectSelect').value;
  var btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  try {
    currentData = await invoke('getIssues', { projectKey: project });
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('mainContent').style.display = '';
    document.getElementById('errorBanner').style.display = 'none';
    render();
  } catch (err) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorBanner').textContent = 'Error: ' + (err.message || err);
    document.getElementById('errorBanner').style.display = 'block';
  } finally {
    btn.classList.remove('spinning');
  }
}

function render() {
  var data = currentData;
  var stats = data.stats;
  var date = new Date(data.refreshedAt).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });

  document.getElementById('headerTitle').textContent = data.project + ' \u2014 Stories & Bugs';
  document.getElementById('headerSub').textContent = 'Excludes: Accepted / Done / Abandoned  |  Refreshed: ' + date;

  document.getElementById('headerPills').innerHTML =
    '<span class="hpill">' + stats.total + ' Total Open</span>' +
    '<span class="hpill story">' + (stats.byType['Story'] || 0) + ' Stories</span>' +
    '<span class="hpill bug">' + (stats.byType['Bug'] || 0) + ' Bugs</span>';

  renderStats(stats);
  renderDueDates(stats);
  buildFilters(stats, data.issues);
  renderTable(data.issues);
}

function card(num, label, colorCls) {
  return '<div class="stat-card c-' + colorCls + '"><div class="stat-num">' + num + '</div><div class="stat-label">' + label + '</div></div>';
}

function renderStats(stats) {
  var html = '';

  html += '<div class="stat-section"><h3>By Status</h3><div class="stat-row">';
  Object.entries(stats.byStatus).forEach(function(e) {
    html += card(e[1], e[0], statusClass[e[0]] || 'blue');
  });
  html += '</div></div>';

  html += '<div class="stat-section"><h3>By Priority</h3><div class="stat-row">';
  ['Critical','Highest','High','Medium','Low','Lowest'].forEach(function(p) {
    if (stats.byPriority[p]) html += card(stats.byPriority[p], p, priorityClass[p] || 'muted');
  });
  Object.keys(stats.byPriority).forEach(function(p) {
    if (!['Critical','Highest','High','Medium','Low','Lowest'].includes(p))
      html += card(stats.byPriority[p], p, 'muted');
  });
  html += '</div></div>';

  html += '<div class="stat-section"><h3>By Age</h3><div class="stat-row">';
  html += card(stats.byAge.fresh, '\u22647 days<br>fresh', 'green');
  html += card(stats.byAge.ageing, '8\u201330 days<br>ageing', 'yellow');
  html += card(stats.byAge.stale, '31\u201390 days<br>stale', 'orange');
  html += card(stats.byAge.critical, '>90 days<br>critical', 'red');
  html += '</div></div>';

  document.getElementById('statsContainer').innerHTML = html;
}

function renderDueDates(stats) {
  document.getElementById('dueSection').innerHTML =
    '<h3>Due Dates</h3><div class="due-cards">' +
    '<div class="due-card c-red"><div class="stat-num">' + stats.dueDates.overdue + '</div><div class="stat-label">Overdue</div></div>' +
    '<div class="due-card c-yellow"><div class="stat-num">' + stats.dueDates.dueSoon + '</div><div class="stat-label">Due \u22647 Days</div></div>' +
    '<div class="due-card c-blue"><div class="stat-num">' + stats.dueDates.hasDueDate + '</div><div class="stat-label">Has Due Date</div></div>' +
    '<div class="due-card c-muted"><div class="stat-num">' + stats.dueDates.noDueDate + '</div><div class="stat-label">No Due Date</div></div>' +
    '</div>';
}

// ── Filters ──
function buildFilters(stats, issues) {
  var bar = document.getElementById('filtersBar');
  bar.querySelectorAll('.ms-wrap').forEach(function(el) { el.remove(); });
  var resetBtn = document.getElementById('resetBtn');

  filterDefs = {
    type: Object.keys(stats.byType).sort(),
    status: Object.keys(stats.byStatus).sort(),
    priority: ['Critical','Highest','High','Medium','Low','Lowest'].filter(function(p) { return stats.byPriority[p]; }),
    assignee: stats.assignees,
    age: ['fresh','ageing','stale','critical'],
    label: stats.labels,
  };

  Object.entries(filterDefs).forEach(function(entry) {
    var key = entry[0]; var values = entry[1];
    if (values.length === 0) return;
    var wrap = document.createElement('div');
    wrap.className = 'ms-wrap'; wrap.id = 'wrap_' + key;

    var btn = document.createElement('button');
    btn.className = 'ms-btn';
    btn.innerHTML = key.charAt(0).toUpperCase() + key.slice(1) + ' <span class="ms-arrow">&#x25BE;</span>';
    btn.addEventListener('click', function(e) { e.stopPropagation(); toggleDropdown(key); });

    var dd = document.createElement('div');
    dd.className = 'ms-dropdown'; dd.id = 'dd_' + key;

    // Add search box for dropdowns with 6+ items (assignee, label, status)
    if (values.length >= 6) {
      var searchBox = document.createElement('input');
      searchBox.type = 'text';
      searchBox.className = 'ms-search';
      searchBox.placeholder = 'Search ' + key + '...';
      searchBox.addEventListener('input', function() {
        var query = searchBox.value.toLowerCase();
        var items = dd.querySelectorAll('.ms-item');
        items.forEach(function(item) {
          var text = item.textContent.toLowerCase();
          item.style.display = text.indexOf(query) !== -1 ? '' : 'none';
        });
      });
      searchBox.addEventListener('click', function(e) { e.stopPropagation(); });
      dd.appendChild(searchBox);
    }

    values.forEach(function(v, i) {
      var lbl = document.createElement('label');
      lbl.className = 'ms-item';
      var cb = document.createElement('input');
      cb.type = 'checkbox'; cb.className = 'ms-check'; cb.value = v; cb.id = 'cb_' + key + '_' + i;
      cb.addEventListener('change', function() { applyFilters(); });
      var span = document.createElement('span');
      span.textContent = v;
      lbl.appendChild(cb); lbl.appendChild(span); dd.appendChild(lbl);
    });

    wrap.appendChild(btn); wrap.appendChild(dd);
    bar.insertBefore(wrap, resetBtn);
  });
}

function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function toggleDropdown(id) {
  var dd = document.getElementById('dd_' + id);
  document.querySelectorAll('.ms-dropdown').forEach(function(d) { if (d !== dd) d.classList.remove('open'); });
  dd.classList.toggle('open');
}

function getSelected(filterId) {
  var vals = [];
  document.querySelectorAll('#dd_' + filterId + ' .ms-check').forEach(function(c) { if (c.checked) vals.push(c.value.toLowerCase()); });
  return vals;
}

function applyFilters() {
  if (!currentData) return;
  var filters = {};
  Object.keys(filterDefs).forEach(function(key) { filters[key] = getSelected(key); });

  var allIssues = currentData.issues;
  var matched = allIssues.filter(function(issue) {
    var labels = issue.labels.map(function(l) { return l.toLowerCase(); });
    return (filters.type.length === 0 || filters.type.includes(issue.type.toLowerCase())) &&
      (filters.status.length === 0 || filters.status.includes(issue.status.toLowerCase())) &&
      (filters.priority.length === 0 || filters.priority.includes(issue.priority.toLowerCase())) &&
      (filters.assignee.length === 0 || filters.assignee.includes(issue.assignee.toLowerCase())) &&
      (filters.age.length === 0 || filters.age.includes(issue.ageBucket.toLowerCase())) &&
      (filters.label.length === 0 || filters.label.some(function(l) { return labels.includes(l); }));
  });

  filteredIssues = matched;
  currentPage = 0;
  renderCurrentPage();
  document.getElementById('mainTable').style.display = matched.length === 0 ? 'none' : '';
}

function resetFilters() {
  document.querySelectorAll('.ms-check').forEach(function(c) { c.checked = false; });
  applyFilters();
}

// ── Export to Excel ──
function exportToExcel() {
  if (!currentData || !filteredIssues.length) return;
  var headers = ['Key','Type','Summary','Status','Priority','Assignee','Age (days)','Due Date','Labels','Latest Comment'];
  var dataRows = filteredIssues.map(function(issue) {
    var comment = issue.latestComment ? (issue.latestComment.author + ' ' + issue.latestComment.date + ': ' + issue.latestComment.body) : '';
    return [
      issue.key,
      issue.type,
      issue.summary,
      issue.status,
      issue.priority,
      issue.assignee,
      String(issue.daysOpen),
      issue.dueDate || '',
      issue.labels.join(', '),
      comment.replace(/[\t\n\r]+/g, ' ').slice(0, 200)
    ];
  });

  function escXml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  var xml = '<?xml version="1.0" encoding="UTF-8"?>\n' +
    '<?mso-application progid="Excel.Sheet"?>\n' +
    '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"\n' +
    ' xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">\n' +
    '<Styles>\n' +
    '  <Style ss:ID="header"><Font ss:Bold="1" ss:Size="11" ss:Color="#FFFFFF"/><Interior ss:Color="#0065FF" ss:Pattern="Solid"/><Alignment ss:Horizontal="Center" ss:Vertical="Center" ss:WrapText="1"/><Borders><Border ss:Position="Bottom" ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#003D99"/></Borders></Style>\n' +
    '  <Style ss:ID="cell"><Alignment ss:Vertical="Top" ss:WrapText="1"/><Font ss:Size="10"/></Style>\n' +
    '  <Style ss:ID="link"><Font ss:Size="10" ss:Color="#0065FF" ss:Underline="Single"/><Alignment ss:Vertical="Top"/></Style>\n' +
    '  <Style ss:ID="bold"><Font ss:Size="10" ss:Bold="1"/><Alignment ss:Vertical="Top" ss:WrapText="1"/></Style>\n' +
    '</Styles>\n' +
    '<Worksheet ss:Name="' + escXml(currentData.project) + ' Issues">\n' +
    '<Table>\n' +
    '  <Column ss:Width="80"/><Column ss:Width="60"/><Column ss:Width="300"/><Column ss:Width="140"/><Column ss:Width="80"/><Column ss:Width="140"/><Column ss:Width="70"/><Column ss:Width="90"/><Column ss:Width="120"/><Column ss:Width="200"/>\n';

  xml += '  <Row ss:Height="28">';
  headers.forEach(function(h) {
    xml += '<Cell ss:StyleID="header"><Data ss:Type="String">' + escXml(h) + '</Data></Cell>';
  });
  xml += '</Row>\n';

  dataRows.forEach(function(vals) {
    xml += '  <Row>';
    vals.forEach(function(v, i) {
      var style = i === 0 ? 'link' : (i === 4 ? 'bold' : 'cell');
      var type = i === 6 ? 'Number' : 'String';
      var val = i === 6 ? v.replace(/[^0-9]/g, '') : v;
      xml += '<Cell ss:StyleID="' + style + '"><Data ss:Type="' + type + '">' + escXml(val) + '</Data></Cell>';
    });
    xml += '</Row>\n';
  });

  xml += '</Table>\n</Worksheet>\n</Workbook>';

  var blob = new Blob([xml], { type: 'application/vnd.ms-excel;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = currentData.project + '_issues_' + new Date().toISOString().slice(0, 10) + '.xls';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Table ──
function renderTable(issues) {
  filteredIssues = issues;
  currentPage = 0;
  renderCurrentPage();
}

function renderCurrentPage() {
  var start = currentPage * pageSize;
  var end = Math.min(start + pageSize, filteredIssues.length);
  var pageIssues = filteredIssues.slice(start, end);
  var totalPages = Math.ceil(filteredIssues.length / pageSize);

  var tbody = document.getElementById('tableBody');
  tbody.innerHTML = pageIssues.map(function(issue) {
    var typeCls = issue.type === 'Bug' ? 'badge-red' : 'badge-blue';
    var sCls = 'text-' + (statusClass[issue.status] || 'blue');
    var pCls = 'text-' + (priorityClass[issue.priority] || 'muted');
    var aCls = 'badge-' + (ageClass[issue.ageBucket] || 'muted');
    var dueCls = issue.dueDate ? (issue.dueStatus === 'overdue' ? 'text-red' : issue.dueStatus === 'due-soon' ? 'text-yellow' : 'text-default') : 'dash';
    var summary = issue.summary.length > 80 ? issue.summary.slice(0, 77) + '...' : issue.summary;
    var labelsHtml = issue.labels.length > 0
      ? issue.labels.map(function(l) { return '<span class="label-badge">' + escHtml(l) + '</span>'; }).join('')
      : '<span class="dash">\u2014</span>';
    var commentHtml = issue.latestComment
      ? '<div class="comment-block"><div class="comment-author">' + escHtml(issue.latestComment.author) + '</div><div class="comment-date">' + issue.latestComment.date + '</div><div class="comment-text">' + escHtml(issue.latestComment.body.slice(0, 120)) + '</div></div>'
      : '<span class="dash">\u2014</span>';

    return '<tr data-type="' + escHtml(issue.type) + '" data-status="' + escHtml(issue.status) + '" data-priority="' + escHtml(issue.priority) + '" data-assignee="' + escHtml(issue.assignee) + '" data-age="' + issue.ageBucket + '" data-labels="' + escHtml(issue.labels.join(',')) + '">' +
      '<td><a href="' + issue.url + '" target="_blank" class="issue-link">' + issue.key + '</a></td>' +
      '<td><span class="type-badge ' + typeCls + '">' + (issue.type === 'Bug' ? 'Bug' : 'Story') + '</span></td>' +
      '<td class="summary-cell" title="' + escHtml(issue.summary) + '">' + escHtml(summary) + '</td>' +
      '<td><span class="' + sCls + '">' + escHtml(issue.status) + '</span></td>' +
      '<td><span class="' + pCls + '">' + escHtml(issue.priority) + '</span></td>' +
      '<td class="text-default">' + escHtml(issue.assignee) + '</td>' +
      '<td data-days="' + issue.daysOpen + '"><span class="age-badge ' + aCls + '">' + issue.daysOpen + 'd</span></td>' +
      '<td data-due="' + (issue.dueDate || 'None') + '"><span class="' + dueCls + '">' + (issue.dueDate || '\u2014') + '</span></td>' +
      '<td>' + labelsHtml + '</td>' +
      '<td>' + commentHtml + '</td>' +
    '</tr>';
  }).join('');

  document.getElementById('resultCount').textContent = 'Showing ' + (start + 1) + '\u2013' + end + ' of ' + filteredIssues.length + ' issues';
  document.getElementById('noData').style.display = filteredIssues.length === 0 ? 'block' : 'none';

  // Update pagination controls
  document.getElementById('prevPage').disabled = currentPage === 0;
  document.getElementById('nextPage').disabled = currentPage >= totalPages - 1;
  document.getElementById('pageInfo').textContent = 'Page ' + (currentPage + 1) + ' of ' + totalPages;
  document.getElementById('pagination').style.display = totalPages <= 1 ? 'none' : '';
}

// ── Sort ──
function sortTable(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('.sort-arrow').forEach(function(a, i) {
    a.textContent = i === col ? (sortDir === 1 ? '\u25B2' : '\u25BC') : '';
  });
  var tbody = document.getElementById('tableBody');
  var rows = Array.from(tbody.querySelectorAll('tr'));
  rows.sort(function(a, b) {
    var av, bv;
    if (col === 6) {
      av = parseInt(a.querySelector('td:nth-child(7)').getAttribute('data-days') || '0');
      bv = parseInt(b.querySelector('td:nth-child(7)').getAttribute('data-days') || '0');
      return sortDir * (av - bv);
    } else if (col === 7) {
      av = a.querySelector('td:nth-child(8)').getAttribute('data-due') || '';
      bv = b.querySelector('td:nth-child(8)').getAttribute('data-due') || '';
      if (av === 'None' && bv === 'None') return 0;
      if (av === 'None') return 1;
      if (bv === 'None') return -1;
      return sortDir * av.localeCompare(bv);
    } else if (col === 4) {
      av = (a.querySelector('td:nth-child(5)').textContent || '').trim().toLowerCase();
      bv = (b.querySelector('td:nth-child(5)').textContent || '').trim().toLowerCase();
      return sortDir * ((priorityOrder[av] !== undefined ? priorityOrder[av] : 99) - (priorityOrder[bv] !== undefined ? priorityOrder[bv] : 99));
    } else {
      av = (a.querySelector('td:nth-child(' + (col+1) + ')').textContent || '').trim().toLowerCase();
      bv = (b.querySelector('td:nth-child(' + (col+1) + ')').textContent || '').trim().toLowerCase();
      return sortDir * av.localeCompare(bv);
    }
  });
  rows.forEach(function(r) { tbody.appendChild(r); });
}

setInterval(loadData, 5 * 60 * 1000);

init().catch(function(err) {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('errorBanner').textContent = 'Failed to initialize: ' + (err.message || err);
  document.getElementById('errorBanner').style.display = 'block';
});
</script>
</body>
</html>
