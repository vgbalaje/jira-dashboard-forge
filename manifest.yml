modules:
  jira:dashboardGadget:
    - key: jira-dashboard-gadget
      resource: dashboard-ui
      resolver:
        function: resolver
      title: Stories & Bugs Dashboard
      description: Live dashboard showing Jira stories and bugs across all projects
      thumbnail: https://developer.atlassian.com/platform/forge/images/icons/jira-dashboard-gadget-icon.svg

  function:
    - key: resolver
      handler: resolvers/index.handler

resources:
  - key: dashboard-ui
    path: static/build

app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/2f1e0278-9045-460b-ab30-6d619fcc6744

permissions:
  scopes:
    - read:jira-work
    - read:jira-user
    - read:project:jira
    - read:issue-details:jira
